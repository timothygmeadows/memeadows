<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- CHANGE ME: this shows up in the browser tab. Use your post title. -->
<title>Post Title</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- 
  MASTHEAD / NAV — this is the same on every page.
  You should NOT need to change anything in here for a new post.
  Just leave it as-is and copy it exactly.
-->
<header class="masthead">
  <div class="wrap">
    <div class="masthead-inner">
      <svg class="contour-mark" viewBox="0 0 40 40" aria-hidden="true">
        <path d="M20 4 C28 4 34 10 34 18 C34 26 28 32 20 32 C12 32 6 26 6 18 C6 10 12 4 20 4 Z"/>
        <path d="M20 10 C24.5 10 28 13.5 28 18 C28 22.5 24.5 26 20 26 C15.5 26 12 22.5 12 18 C12 13.5 15.5 10 20 10 Z"/>
        <path d="M20 15 C21.8 15 23 16.4 23 18 C23 19.6 21.8 21 20 21 C18.2 21 17 19.6 17 18 C17 16.4 18.2 15 20 15 Z"/>
      </svg>
      <div>
        <div class="site-title"><a href="../index.html" style="color:inherit; text-decoration:none;">Field Notes</a></div>
        <div class="site-tagline">A park journal</div>
      </div>
    </div>
    <nav class="site-nav">
      <a href="../index.html">All entries</a>
      <a href="../about.html">About</a>
      <a href="../about-me.html">Quotes</a>
      <a href="../quotes.html">Quotes</a>
    </nav>
  </div>
</header>

<main class="wrap">

  <!-- 
    POST HEADER — the title block at the top of the post.
    CHANGE ME each time:
      - the date
      - the location
      - the title (keep it lowercase if that's your style, like "camp north end")
  -->
  <div class="post-header">
    <div class="post-meta">
      <span>Month Day, Year</span>
      <span>City, State</span>
    </div>
    <h1 class="post-title">post title</h1>
  </div>

  <!-- POST BODY 
    this is where all your writing and photos go.
   -->

  <div class="post-body">

    <!-- A paragraph of writing. Just plain text between <p> tags. -->

    <p>Write your first paragraph here.</p>

    <!-- 
      A photo with a caption.
      - src: path to the image file (put images in the /images folder)
      - alt: a short plain-text description of the photo (for accessibility,
        and shown if the image fails to load)
      - figcaption: the caption text shown under the photo
    -->
    <figure>
      <img src="../images/your-image.jpg" alt="Describe the photo here">
      <figcaption>Write your caption here.</figcaption>
    </figure>

  <!-- if you want a quote, it's kinda weird to put it here, but here you go. 
   <blockquote>"Quote text goes here" - Author, Source</blockquote> 
  -->

  </div>

  <!-- 
    Optional extra photo outside the post-body (like a sunset shot at the end).
    Delete this block if you don't need it.
  -->
  <figure>
    <img src="../images/your-image-2.jpg" alt="Describe the photo here" style="aspect-ratio: auto; object-fit: contain;">
    <figcaption>Write your caption here.</figcaption>
  </figure>

  <!-- 
    BACK LINK — leave this as-is. It just sends readers back to the homepage.
  -->
  <div class="post-nav wrap" style="padding-left:0; padding-right:0;">
    <a href="../index.html">&larr; Back to all entries</a>
  </div>

</main>

<footer>
  <div class="wrap">Field Notes — updated as I visit. Built as a simple static site.</div>
</footer>

</body>
</html>
